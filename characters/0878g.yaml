name: Coke
age: 24
personality: Loyal, resolute, self-sacrificing, calm, disciplined, honor-bound
appearance: >
Young Asian male, short black hair, traditional dark kimono, medium build, holds a Japanese katana, solemn expression
backstory: >Coke is a noble samurai bound by honor and duty. In a broken world invaded by dark monsters, 
